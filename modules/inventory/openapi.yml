openapi: 3.0.3
info:
  title: Inventory API
  version: 1.0.0
  description: |-
    REST API for managing products and stock within the Event-Driven Order Engine.
    This API allows adding products, listing them, and manually updating stock.
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    email: support@order-fulfillment.example.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080/
    description: Development Server
  - url: https://api.order-fulfillment.example.com
    description: Production Server
tags:
  - name: Inventory
    description: Operations related to products and inventory management

paths:
  /api/inventory/products:
    post:
      tags:
        - Inventory
      summary: Add a new product
      description: Create a new product in the inventory with initial stock.
      operationId: addProduct
      requestBody:
        required: true
        description: Details of the product to be added
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductDto'
      responses:
        '201':
          description: Product added successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product added successfully.
                  id:
                    type: string
                    format: uuid
                    example: 3b2f6b8d-8e5c-4023-913f-6f81d4ca92b0
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - Inventory
      summary: Retrieve the list of products
      description: Retrieve a paginated list of all products in the inventory.
      operationId: listProducts
      parameters:
        - name: limit
          in: query
          required: false
          description: Limit the number of products returned. Default is 10.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: offset
          in: query
          required: false
          description: Number of products to skip. Default is 0.
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
      responses:
        '200':
          description: Products retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductResponse'
                  total:
                    type: integer
                    example: 50
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inventory/products/{id}:
    get:
      tags:
        - Inventory
      summary: Retrieve a product by ID
      description: Retrieve detailed information about a single product by its UUID.
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          description: The UUID of the product
          schema:
            type: string
            format: uuid
            example: 3b2f6b8d-8e5c-4023-913f-6f81d4ca92b0
      responses:
        '200':
          description: Product details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/ProductNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inventory/products/{id}/stock:
    post:
      tags:
        - Inventory
      summary: Update product stock
      description: Manually add or remove stock for a product (e.g. for manual corrections or restocks).
      operationId: updateStock
      parameters:
        - name: id
          in: path
          required: true
          description: The UUID of the product to update
          schema:
            type: string
            format: uuid
            example: 3b2f6b8d-8e5c-4023-913f-6f81d4ca92b0
      requestBody:
        required: true
        description: Delta quantity to apply to stock
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStockDto'
      responses:
        '200':
          description: Stock updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Stock updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/ProductNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    AddProductDto:
      type: object
      required:
        - name
        - sku
        - unitPrice
        - stockQuantity
      properties:
        name:
          type: string
          example: "Wireless Headphones"
        sku:
          type: string
          example: "WH-1000XM4"
        unitPrice:
          type: number
          minimum: 0.0
          example: 299.99
        stockQuantity:
          type: integer
          minimum: 0
          example: 50

    UpdateStockDto:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          description: Delta amount to add or remove from stock. Negative reduces stock.
          example: 10

    ProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 3b2f6b8d-8e5c-4023-913f-6f81d4ca92b0
        name:
          type: string
          example: "Wireless Headphones"
        sku:
          type: string
          example: "WH-1000XM4"
        unitPrice:
          type: number
          example: 299.99
        stockQuantity:
          type: integer
          example: 60
        createdAt:
          type: string
          format: date-time
          example: '2026-06-29T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-29T12:05:00Z'

  responses:
    BadRequest:
      description: Bad request / validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 400
              message:
                type: array
                items:
                  type: string
                example:
                  - "unitPrice must be a positive number"
              error:
                type: string
                example: Bad Request

    ProductNotFound:
      description: The specified product was not found
      content:
        application/json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: 'https://api.order-engine.com/errors/product-not-found'
              title:
                type: string
                example: Product Not Found
              status:
                type: integer
                example: 404
              detail:
                type: string
                example: Product with ID 3b2f6b8d-8e5c-4023-913f-6f81d4ca92b0 was not found.

    InternalServerError:
      description: General internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: 'about:blank'
              title:
                type: string
                example: Internal Server Error
              status:
                type: integer
                example: 500
              detail:
                type: string
                example: An unexpected error occurred.
