openapi: 3.0.3
info:
  title: Notification API
  version: 1.0.0
  description: |-
    REST API for retrieving historical notification audit logs within the Event-Driven Order Engine.
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    email: support@order-fulfillment.example.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080/
    description: Development Server
  - url: https://api.order-fulfillment.example.com
    description: Production Server
tags:
  - name: Notification
    description: Operations related to historical notification audit logs

paths:
  /api/notifications:
    get:
      tags:
        - Notification
      summary: Retrieve the list of notifications
      description: Retrieve a paginated list of notification events, optionally filtered by orderId.
      operationId: listNotifications
      parameters:
        - name: orderId
          in: query
          required: false
          description: Filter notifications by Order UUID.
          schema:
            type: string
            format: uuid
            example: 2d9c6d91-d051-4fe1-9ea5-36711f8262a5
        - name: limit
          in: query
          required: false
          description: Limit the number of notifications returned. Default is 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: offset
          in: query
          required: false
          description: Number of notifications to skip. Default is 0.
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
      responses:
        '200':
          description: Notifications retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationResponse'
                  total:
                    type: integer
                    example: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b07d4fa1-c910-48e2-9b2f-6a7e5dc70d27
        orderId:
          type: string
          format: uuid
          example: 2d9c6d91-d051-4fe1-9ea5-36711f8262a5
        eventType:
          type: string
          example: OrderPlacedEvent
        message:
          type: string
          example: Order 2d9c6d91-d051-4fe1-9ea5-36711f8262a5 has been successfully placed.
        createdAt:
          type: string
          format: date-time
          example: '2026-06-30T05:15:30.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-30T05:15:30.000Z'

  responses:
    BadRequest:
      description: Bad request / validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 400
              message:
                type: array
                items:
                  type: string
                example:
                  - "orderId must be a UUID"
              error:
                type: string
                example: Bad Request

    InternalServerError:
      description: General internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              type:
                type: string
                example: 'about:blank'
              title:
                type: string
                example: Internal Server Error
              status:
                type: integer
                example: 500
              detail:
                type: string
                example: An unexpected error occurred.
